<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KSHR</title>
    <meta name="description" content="KSHR. Knowledge, Strategy, Holding, Returns.">
    <meta name="author" content="KSHR">
    <meta property="og:title" content="KSHR">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kshr.ai/">
    <meta property="og:description" content="KSHR. Knowledge, Strategy, Holding, Returns.">
    <meta name="theme-color" content="#fbfaf7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260502-identity">
</head>
<body class="homepage identity-home">
    <main id="top" class="identity-shell">
        <section class="identity-stage" aria-labelledby="identity-title">
            <h1 id="identity-title" class="identity-word" aria-label="KSHR">
                <button class="identity-letter is-active" type="button" data-term="knowledge" aria-pressed="true">K</button>
                <button class="identity-letter" type="button" data-term="strategy" aria-pressed="false">S</button>
                <button class="identity-letter" type="button" data-term="holding" aria-pressed="false">H</button>
                <button class="identity-letter" type="button" data-term="returns" aria-pressed="false">R</button>
            </h1>

            <div class="identity-definition" aria-live="polite" aria-atomic="true">
                <p id="definition-title" class="definition-title">Knowledge</p>
                <p id="definition-copy" class="definition-copy">
                    Writing and research that sharpens how we see the world. Our blog,
                    essays, and deep dives are where conviction begins.
                </p>
            </div>
        </section>
    </main>

    <script>
        (() => {
            const definitions = {
                knowledge: {
                    title: "Knowledge",
                    copy: "Writing and research that sharpens how we see the world. Our blog, essays, and deep dives are where conviction begins."
                },
                strategy: {
                    title: "Strategy",
                    copy: "We partner with founders and operators to solve their hardest problems. Not slide decks, real work embedded in the business."
                },
                holding: {
                    title: "Holding",
                    copy: "Products and platforms we've built from the ground up. We don't just advise, we ship, operate, and own."
                },
                returns: {
                    title: "Returns",
                    copy: "Capital deployed with conviction. We invest in companies at the intersection of our expertise, where our insight compounds alongside our capital."
                }
            };

            const letters = Array.from(document.querySelectorAll(".identity-letter"));
            const title = document.querySelector("#definition-title");
            const copy = document.querySelector("#definition-copy");

            const setActive = (letter) => {
                const definition = definitions[letter.dataset.term];

                letters.forEach((candidate) => {
                    const active = candidate === letter;
                    candidate.classList.toggle("is-active", active);
                    candidate.setAttribute("aria-pressed", String(active));
                });

                title.textContent = definition.title;
                copy.textContent = definition.copy;
            };

            letters.forEach((letter) => {
                letter.addEventListener("mouseenter", () => setActive(letter));
                letter.addEventListener("focus", () => setActive(letter));
                letter.addEventListener("click", () => setActive(letter));
            });
        })();
    </script>
</body>
</html>
